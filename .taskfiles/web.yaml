# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  pnpm:
    internal: true
    dir: web
    sources: [package*.json]
    cmd: pnpm install

  build-wasm:
    env:
      GOOS: js
      GOARCH: wasm
    cmds:
      - go generate -x
      - go build -ldflags='-w -s' -trimpath -tags gzip -o web/src/assets/gones.wasm

  optimize:
    dir: web/src/assets
    vars:
      TEMP:
        sh: mktemp
    cmds:
      - defer: rm -f "{{ .TEMP }}"
      - wasm-opt --converge --flatten --rereloop -O3 --gufa -O3 --enable-bulk-memory --enable-bulk-memory-opt --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o "{{ .TEMP }}" gones.wasm
      - mv "{{ .TEMP }}" gones.wasm

  build:
    deps: [build-wasm, pnpm]
    dir: web
    cmds:
      - task: optimize
      - pnpm run build

  serve:
    deps: [build-wasm, pnpm]
    dir: web
    cmd: pnpm run dev
