name: Build

on:
  push: {}
  schedule:
    - cron: '41 8 5 * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LINUX_DEPENDENCIES: >
    libasound2-dev
    libc6-dev
    libgl1-mesa-dev
    libglu1-mesa-dev
    libxcursor-dev
    libxi-dev
    libxinerama-dev
    libxrandr-dev
    libxxf86vm-dev
  BUILD_TAGS: gzip,ebitenginesinglethread

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install apt dependencies
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: ${{ env.LINUX_DEPENDENCIES }}
          version: amd64
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install apt dependencies
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: ${{ env.LINUX_DEPENDENCIES }}
          version: amd64
      - name: Test
        run: xvfb-run go test ./... -coverprofile=coverage.txt -covermode=atomic

  build-windows:
    name: Build (windows)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Generate
        run: go generate -x
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: ./hack/build-windows.sh
      - name: Compress
        working-directory: dist
        run: |
          zip -r ../gones_windows_amd64.zip GoNES-amd64.exe
          zip -r ../gones_windows_arm64.zip GoNES-arm64.exe
      - name: Upload Artifact (amd64)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gones_windows_amd64
          path: gones_windows_amd64.zip
      - name: Upload Artifact (arm64)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gones_windows_arm64
          path: gones_windows_arm64.zip

  build-darwin:
    name: Build (darwin)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Generate
        run: go generate -x
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: ./hack/build-darwin.sh
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gones_darwin
          path: dist/gones_darwin.tar.gz
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gones_cask
          path: dist/gones.rb

  build-linux:
    name: Build (linux-${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - platform: amd64
            runs-on: ubuntu-24.04
          - platform: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install apt dependencies
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: ${{ env.LINUX_DEPENDENCIES }}
          version: ${{ matrix.platform }}
      - name: Generate
        run: go generate -x
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags='-w -s' -trimpath -tags "${{ env.BUILD_TAGS }}" -o dist/gones
      - name: Compress
        run: tar -cvf gones_linux_${{ matrix.platform }}.tar.gz -C dist .
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gones_linux_${{ matrix.platform }}
          path: gones_linux_${{ matrix.platform }}.tar.gz

  build-web:
    name: Build Web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Generate
        run: go generate -x
      - name: Build Go
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -ldflags='-w -s' -trimpath -tags "${{ env.BUILD_TAGS }}" -o web/src/assets/gones.wasm
      - name: Install binaryen
        env:
          GH_REPO: webassembly/binaryen
          BINARYEN_VERSION: version_129
          GH_TOKEN: ${{ github.token }}
        run: |
          temp="$(mktemp --directory)"
          gh release download "$BINARYEN_VERSION" --pattern="*-$(uname -m)-linux.tar.gz" --output=- \
            | tar xzvf - --strip-components=1 --directory="$temp"
          echo "$temp/bin" >> $GITHUB_PATH
      - name: Optimize
        if: startsWith(github.ref, 'refs/tags/') || github.ref_name == 'main'
        working-directory: web/src/assets
        run: |
          temp="$(mktemp)"
          wasm-opt --converge --flatten --rereloop -O3 --gufa -O3 --enable-bulk-memory --enable-bulk-memory-opt --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o "$temp" gones.wasm
          mv "$temp" gones.wasm
      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          package_json_file: web/package.json
      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: web/.nvmrc
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install Node dependencies
        working-directory: web
        run: pnpm install
      - name: Build Node
        working-directory: web
        env:
          VITE_PLAUSIBLE_HOST: https://analytics.gabe565.com
        run: pnpm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

  deploy-web:
    name: Deploy Web
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test, build-web]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test, build-windows, build-darwin, build-linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: gones_*
          path: dist
          merge-multiple: true
      - name: Generate Changelog
        id: changelog
        uses: gabe565/changelog-generator@733bb2c02fab0bb0e2dd9a059e0dc9f668d05c95 # v1.1.5
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/gones_*

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    needs: [release]
    env:
      commit_name: gabe565-goreleaser[bot]
      commit_email: 159411820+gabe565-goreleaser[bot]@users.noreply.github.com
    steps:
      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          repositories: homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: gabe565/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gones_cask
          path: Casks
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Brew formula update for gones version ${{ github.ref_name }}
          commit_user_name: ${{ env.commit_name }}
          commit_user_email: ${{ env.commit_email }}
          commit_author: ${{ env.commit_name }} <${{ env.commit_email }}>
